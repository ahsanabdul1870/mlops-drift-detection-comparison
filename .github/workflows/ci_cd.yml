name: CI/CD Pipeline

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run unit tests
        run: |
          pytest tests -q

  build-image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f docker/Dockerfile -t mlops-api:${{ github.sha }} .

  drift-check-and-retrain:
    needs: [test, build-image]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare synthetic drift datasets
        run: |
          python src/drift_simulator.py

      - name: Run drift check
        id: drift_guard
        run: |
          python src/ci_drift_guard.py

      - name: Auto-trigger retraining
        if: steps.drift_guard.outputs.drift_detected == 'true'
        env:
          DETECTOR: ${{ steps.drift_guard.outputs.primary_detector }}
          DRIFT_LEVEL: ${{ steps.drift_guard.outputs.drift_level }}
          RETRAIN_DATASET: data_clean.csv
        run: |
          python src/retrain.py

      - name: Create pull request for retraining changes
        if: steps.drift_guard.outputs.drift_detected == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          branch: auto/retrain-${{ github.run_id }}
          title: "Auto retraining for drift detection"
          commit-message: "chore: auto retrain model after drift detection"
          body: |
            This PR was created automatically by GitHub Actions after drift was detected.

            It includes retraining outputs generated by src/retrain.py and should be reviewed before merging.
          delete-branch: true

      - name: Print CI drift report
        run: |
          cat mlflow/monitoring/ci_drift_report.json
